name: Backstop Visual Regression Tests

on:
  pull_request:
    branches: [ master, main ]
  push:
    branches: [ master, main ]

jobs:
  backstop:
    runs-on: ubuntu-latest

    steps:
      # 1) Checkout project
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2) Install Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 3) Install dependencies
      - name: Install Dependencies
        working-directory: ./backstop
        run: npm ci

      # 4) Inject environment variables from GitHub Secrets
      - name: Create .env
        working-directory: ./backstop
        run: |
          echo "MONETIS_LOGIN_URL=${{ secrets.MONETIS_LOGIN_URL }}" >> .env
          echo "MONETIS_DASHBOARD_URL=${{ secrets.MONETIS_DASHBOARD_URL }}" >> .env
          echo "MONETIS_USERNAME=${{ secrets.MONETIS_USERNAME }}" >> .env
          echo "MONETIS_PASSWORD=${{ secrets.MONETIS_PASSWORD }}" >> .env
          echo "MONETIS_USERNAME_SELECTOR=input[name=\"email\"]" >> .env
          echo "MONETIS_PASSWORD_SELECTOR=input[name=\"password\"]" >> .env
          echo "MONETIS_LOGIN_BUTTON_SELECTOR=button[type=\"submit\"]" >> .env
          echo "MONETIS_DASHBOARD_READY_SELECTOR=.dashboard" >> .env
          echo "MONETIS_OPTIONAL_POPUP_CLOSE_SELECTOR=" >> .env

      # 5) Run Backstop tests
      - name: Run BackstopJS tests
        working-directory: ./backstop
        run: npx backstop test || true  # do NOT fail the job yet

      # 6) Always upload reports (ref + diffs)
      - name: Upload BackstopJS Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backstop-report
          path: backstop/backstop_data

      # 7) Fail PR if mismatches exist
      - name: Fail job if mismatches found
        working-directory: ./backstop
        run: |
          if grep -R "Mismatch errors found" -n backstop_data/html_report/config.js; then
            echo "❌ Visual differences detected."
            exit 1
          else
            echo "✅ No visual differences."
          fi
