name: Backstop Visual Regression

on:
  pull_request:
    branches: [ master, main ]
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  backstop:
    name: Run BackstopJS Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    outputs:
      result: ${{ steps.detect.outputs.result }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Backstop Dependencies
        working-directory: ./backstop
        run: npm ci

      - name: Inject Backstop .env
        working-directory: ./backstop
        run: |
          echo "MONETIS_LOGIN_URL=${{ secrets.MONETIS_LOGIN_URL }}" >> .env
          echo "MONETIS_DASHBOARD_URL=${{ secrets.MONETIS_DASHBOARD_URL }}" >> .env
          echo "MONETIS_USERNAME=${{ secrets.MONETIS_USERNAME }}" >> .env
          echo "MONETIS_PASSWORD=${{ secrets.MONETIS_PASSWORD }}" >> .env
          echo 'MONETIS_USERNAME_SELECTOR=input[name="email"]' >> .env
          echo 'MONETIS_PASSWORD_SELECTOR=input[name="password"]' >> .env
          echo 'MONETIS_LOGIN_BUTTON_SELECTOR=button[type="submit"]' >> .env
          echo 'MONETIS_DASHBOARD_READY_SELECTOR=.dashboard' >> .env
          echo 'MONETIS_OPTIONAL_POPUP_CLOSE_SELECTOR=' >> .env
          echo 'MONETIS_REGISTER_URL=https://monetis-delta.vercel.app/register' >> .env
          echo 'MONETIS_REG_NAME=Testing_Carlos' >> .env
          echo 'MONETIS_REG_SURNAME=Account' >> .env
          echo 'MONETIS_REG_EMAIL=testing_carlod@example.com' >> .env
          echo 'MONETIS_REG_PHONE=123123123' >> .env
          echo 'MONETIS_REG_STREET=Some Random street' >> .env
          echo 'MONETIS_REG_POSTAL=1231-123' >> .env
          echo 'MONETIS_REG_CITY=Lisbon' >> .env
          echo 'MONETIS_REG_COUNTRY_TEXT=Portugal' >> .env
          echo 'MONETIS_REG_SUBMIT=false' >> .env

      - name: Run Backstop Tests
        working-directory: ./backstop
        run: npx backstop test || true

      - name: Upload Backstop Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backstop-report
          path: |
            backstop/backstop_data/html_report
            backstop/backstop_data/bitmaps_test

      - name: Detect Backstop result (pass/fail)
        id: detect
        working-directory: ./backstop
        run: |
          if grep -R "Mismatch errors found" -n backstop_data/html_report/config.js; then
            echo "result=fail" >> $GITHUB_OUTPUT
          else
            echo "result=pass" >> $GITHUB_OUTPUT
          fi

      - name: Post Backstop PR Comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: backstop-vrt
          message: |
            ## 🖼️ BackstopJS Visual Regression Report
            **Result:** ${{ steps.detect.outputs.result }}
            **Report Artifact:** *(See "backstop-report" artifact in this PR)*  
            **CI Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Fail when mismatches exist
        working-directory: ./backstop
        run: |
          if grep -R "Mismatch errors found" -n backstop_data/html_report/config.js; then
            exit 1
          fi

  publish-report:
    name: Publish Backstop Report to GitHub Pages
    needs: backstop
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Download Backstop report artifact
        uses: actions/download-artifact@v4
        with:
          name: backstop-report

      - name: Prepare report directory
        run: |
          REPORT_DIR="report-${{ github.run_id }}"
          mkdir -p "backstop/${REPORT_DIR}"
          cp -r html_report/* "backstop/${REPORT_DIR}/"

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: .

      - name: Comment PR with Pages link
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: backstop-pages
          message: |
            ## 📘 Live Backstop Report
            https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/backstop/report-${{ github.run_id }}/index.html