name: Cleanup Backstop Reports

on:
  schedule:
    - cron: "0 1 * * *"   # run daily at 01:00 UTC
  workflow_dispatch:      # allow manual triggering

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: gh-pages

      - name: List existing Backstop report folders
        id: list
        run: |
          echo "Found these existing backstop report folders:"
          ls -1 backstop || true

      - name: Cleanup old backstop reports (keep latest 10)
        run: |
          mkdir -p backstop
          cd backstop

          echo "Sorting report directories..."
          REPORTS=$(ls -1 | sort -n)

          echo "Reports found:"
          echo "$REPORTS"

          # Keep latest 10 only
          KEEP=10
          COUNT=$(echo "$REPORTS" | wc -l)
          REMOVE=$((COUNT-KEEP))

          if [ $REMOVE -gt 0 ]; then
            echo "Removing old reports..."
            REMOVE_LIST=$(echo "$REPORTS" | head -n $REMOVE)
            echo "$REMOVE_LIST" | xargs rm -rf
          else
            echo "No reports to remove."
          fi

      - name: Commit and push cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .
          git commit -m "Cleanup old Backstop reports (auto)" || echo "Nothing to commit"
          git push origin gh-pages